  summary: |
    Full-time PhD Research & Teaching Residency focusing on high-accuracy gesture recognition systems.

    **Research Highlights:**
    - Developed novel **Temporal Convolutional Network (TCN)** architectures in Tensorflow, achieving 90% classification accuracy in discriminating between 53 classes.
    - Engineered a low-latency gesture control interface (sub-100ms) for the ENHANCE project, directly improving user engagement in clinical trials.
    - Coordinated international research initiatives with VUB (Belgium), resulting in shared datasets and a joint doctorate.

    **Teaching & Mentorship:**
    - Mentored 10+ undergraduate theses in AI/Signal Processing, leading to 5 published conference papers and successful industry placements.
    - Developed and taught hands-on labs for Machine Learning and Digital Signal Processing using Python and MATLAB.
